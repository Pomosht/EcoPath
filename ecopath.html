<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPath AI - Travel Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="ecopath.css">
</head>
<body>
<div class="wrapper">
    <div class="sidebar">
        <h2 class="fw-bold mb-1" style="color: var(--eco-green)"><i class="bi bi-geo-alt-fill"></i> EcoPath AI</h2>
        <p class="text-muted small mb-4">Интелигентна еко-навигация</p>
        
        <div class="search-box">
            <label class="small fw-bold text-muted">ОТ:</label>
            <input type="text" id="startInput" class="form-control mb-2" value="Sofia, Bulgaria">
            <label class="small fw-bold text-muted">ДО:</label>
            <input type="text" id="endInput" class="form-control mb-2" value="Paris, France">
            
            <label class="small fw-bold text-muted">ВИД ТРАНСПОРТ:</label>
            <select id="transportMode" class="form-select mb-3">
                <option value="car">🚗 Автомобил</option>
                <option value="electric">🔋 Електромобил</option>
                <option value="bus">🚌 Автобус</option>
                <option value="bike">🚲 Велосипед</option>
            </select>
            
            <button class="btn-route" id="routeBtn" onclick="calculateRoute()">ПРЕСМЕТНИ ПЪТЯ</button>
            
            <div id="loader" class="mt-2" style="display:none">
                <div class="spinner-border spinner-border-sm text-success"></div> Анализиране...
            </div>
        </div>

        <div class="box mt-3">
            <div class="d-flex justify-content-between mb-2">
                <span class="small fw-bold">Екологичност:</span>
                <span id="scoreText" class="badge bg-success">0%</span>
            </div>
            <div class="progress" style="height: 10px;">
                <div id="scoreBar" class="progress-bar bg-success" style="width: 0%"></div>
            </div>
        </div>

        <h6 class="mt-4 small fw-bold text-muted">📍 ОБЕКТИ ПО ПЪТЯ:</h6>
        <div class="poi-filters d-flex gap-2 mb-2">
            <input class="poi-check" type="checkbox" value="130" id="checkRest"> <label for="checkRest" class="small">Храна</label>
            <input class="poi-check" type="checkbox" value="330" id="checkHotel"> <label for="checkHotel" class="small">Спине</label>
        </div>
        <div id="poiList" class="poi-container border rounded bg-white p-2" style="max-height: 200px; overflow-y: auto;">
            <p class="text-muted small">Изберете категория...</p>
        </div>
    </div>

    <div id="map"></div>

    <div class="stats-overlay">
        <div class="stat-card"><small>КМ</small><br><strong id="distVal">0</strong></div>
        <div class="stat-card"><small>ВРЕМЕ</small><br><strong id="timeVal">0ч 0м</strong></div>
        <div class="stat-card"><small>CO₂</small><br><strong id="co2Val">0.0</strong></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="ecopath.js"></script>
</body>
</html>
