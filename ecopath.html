<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPath AI - Travel Edition</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="ecopath.css">
</head>
<body>

<div class="wrapper">
    <div class="sidebar">
        <h2 class="fw-bold mb-1" style="color: var(--eco-green)">
            <i class="bi bi-clock-history"></i> EcoPath AI
        </h2>
        <p class="text-muted small mb-4">Интелигентна еко-навигация</p>

        <div class="search-box">
            <label class="small fw-bold text-muted">ОТ:</label>
            <input type="text" id="startInput" class="form-control mb-2" value="Sofia, Bulgaria">
            
            <label class="small fw-bold text-muted">ДО:</label>
            <input type="text" id="endInput" class="form-control mb-2" value="Paris, France">
            
            <label class="small fw-bold text-muted">ВИД ТРАНСПОРТ:</label>
            <select id="transportMode" class="form-select mb-3">
                <option value="car">🚗 Автомобил (Бензин/Дизел)</option>
                <option value="electric">⚡ Електрически автомобил</option>
                <option value="bus">🚌 Международен автобус</option>
                <option value="bike">🚴 Велосипед</option>
            </select>

            <button class="btn-eco" onclick="calculateRoute()">
                <i class="bi bi-calculator"></i> ПРЕСМЕТНИ ПЪТЯ
            </button>
            <div id="loader" class="mt-2" style="display:none">
                <div class="spinner-border spinner-border-sm text-success"></div> Анализиране...
            </div>
        </div>

        <div class="box">
            <h6 class="fw-bold small text-muted text-uppercase">Държави по пътя:</h6>
            <div id="countryList" class="mb-3"><span class="text-muted small">Няма данни.</span></div>
            
            <div class="d-flex justify-content-between mb-2">
                <span class="small fw-bold">Екологичност:</span>
                <span id="scoreText" class="badge bg-success">0%</span>
            </div>
            <div class="progress" style="height: 10px;">
                <div id="scoreBar" class="progress-bar bg-success" style="width: 0%"></div>
            </div>
        </div>

        <h6 class="mt-4 small fw-bold text-muted text-uppercase">Пинг на обекти:</h6>
        <div class="poi-filters d-flex gap-3">
            <div class="form-check">
                <input class="form-check-input poi-check" type="checkbox" value="130" id="checkRest">
                <label class="form-check-label small" for="checkRest">Ресторанти</label>
            </div>
            <div class="form-check">
                <input class="form-check-input poi-check" type="checkbox" value="330" id="checkHotel">
                <label class="form-check-label small" for="checkHotel">Хотели</label>
            </div>
        </div>

        <h6 class="mt-4 small fw-bold text-muted">📍 СПИСЪК С ОБЕКТИ:</h6>
        <div id="poiList" class="poi-container">
            <p class="text-muted small">Изберете категория за търсене...</p>
        </div>
    </div>

    <div id="map"></div>

    <div class="stats-overlay">
        <div class="stat-card">
            <small class="text-muted">Разстояние</small><br>
            <strong id="distVal">0</strong> <small>км</small>
        </div>
        <div class="stat-card">
            <small class="text-muted">Време</small><br>
            <strong id="timeVal" class="time-highlight">0ч 0м</strong>
        </div>
        <div class="stat-card">
            <small class="text-muted">CO₂ емисии</small><br>
            <strong id="co2Val" class="text-success">0.0</strong> <small>кг</small>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="ecopath.js"></script>
</body>
</html>
