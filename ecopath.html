<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPath AI - Ultra Stable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --eco: #1b4332; }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; }
        .sidebar { width: 350px; min-width: 350px; background: white; padding: 20px; box-shadow: 4px 0 10px rgba(0,0,0,0.1); z-index: 2000; overflow-y: auto; }
        #map { flex-grow: 1; height: 100%; background: #ddd; }
        .stat-card { background: #f8f9fa; border: 1px solid #eee; border-radius: 10px; padding: 10px; text-align: center; margin-bottom: 15px; }
        .poi-list { border: 1px solid #eee; border-radius: 8px; padding: 10px; max-height: 250px; overflow-y: auto; font-size: 0.85rem; background: #fff; }
        #loading { display: none; color: #d35400; font-weight: bold; font-size: 0.8rem; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="sidebar">
        <h3 class="fw-bold" style="color: var(--eco)"><i class="bi bi-geo-alt-fill"></i> EcoPath AI</h3>
        <div class="mb-3">
            <input type="text" id="startInput" class="form-control mb-2" placeholder="От (напр. Sofia)">
            <input type="text" id="endInput" class="form-control mb-2" placeholder="До (напр. Plovdiv)">
            <select id="transport" class="form-select mb-2">
                <option value="0.15">🚗 Бензинов автомобил</option>
                <option value="0.04">⚡ Електрически автомобил</option>
                <option value="0.03">🚌 Автобус</option>
            </select>
            <button class="btn w-100 fw-bold" style="background: var(--eco); color: white;" onclick="runApp()">ИЗЧИСЛИ</button>
        </div>
        <div id="loading text-center">Обработка...</div>
        <div class="stat-card">
            <div class="row small">
                <div class="col-4 border-end">КМ<br><b id="dist">0</b></div>
                <div class="col-4 border-end">ВРЕМЕ<br><b id="time">0</b></div>
                <div class="col-4">CO₂ кг<br><b id="co2">0</b></div>
            </div>
        </div>
        <h6 class="fw-bold small text-muted">ОБЕКТИ В ТОЧКИТЕ:</h6>
        <div id="poiList" class="poi-list">Въведете градове и натиснете бутона.</div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImVlY2M5ZDQzYzg1OTQwYzBhMzUyNmMyMGQ2ZWY2MDNmIiwiaCI6Im11cm11cjY0In0=';
    const map = L.map('map', { zoomControl: false }).setView([42.7, 23.3], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let routeLayer, poiMarkers = L.layerGroup().addTo(map);

    async function fetchGeo(city) {
        const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}`);
        const d = await r.json();
        return d.length > 0 ? { lat: d[0].lat, lon: d[0].lon, name: d[0].display_name } : null;
    }

    async function runApp() {
        const startVal = document.getElementById('startInput').value;
        const endVal = document.getElementById('endInput').value;
        if(!startVal || !endVal) return alert("Моля, попълнете и двете полета.");

        document.getElementById('poiList').innerHTML = "⏳ Търсене на локации...";
        poiMarkers.clearLayers();

        try {
            const sD = await fetchGeo(startVal);
            await new Promise(r => setTimeout(r, 600)); // Пауза против блокиране
            const eD = await fetchGeo(endVal);

            if(!sD || !eD) throw new Error("Неуспешно намиране на градовете.");

            const rRes = await fetch('https://api.openrouteservice.org/v2/directions/driving-car/geojson', {
                method: 'POST',
                headers: { 'Authorization': API_KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify({ coordinates: [[sD.lon, sD.lat], [eD.lon, eD.lat]] })
            });
            const rData = await rRes.json();
            
            if(routeLayer) map.removeLayer(routeLayer);
            routeLayer = L.geoJSON(rData, { style: { color: '#1b4332', weight: 5 } }).addTo(map);
            map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });

            const s = rData.features[0].properties.summary;
            document.getElementById('dist').innerText = Math.round(s.distance / 1000);
            document.getElementById('time').innerText = Math.floor(s.duration / 3600) + "ч";
            document.getElementById('co2').innerText = ((s.distance/1000) * document.getElementById('transport').value).toFixed(1);

            document.getElementById('poiList').innerHTML = "";
            await findPOI(sD.lat, sD.lon, "Начало");
            await findPOI(eD.lat, eD.lon, "Финал");

        } catch (err) {
            console.error(err);
            document.getElementById('poiList').innerHTML = "❌ Грешка: Проверете имената на градовете.";
        }
    }

    async function findPOI(lat, lon, label) {
        try {
            const res = await fetch('https://api.openrouteservice.org/pois', {
                method: 'POST',
                headers: { 'Authorization': API_KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    request: "pois",
                    geometry: { geojson: { type: "Point", coordinates: [parseFloat(lon), parseFloat(lat)] }, buffer: 1500 },
                    filters: { category_group_ids: [160, 220], limit: 8 }
                })
            });
            const data = await res.json();
            const list = document.getElementById('poiList');
            list.innerHTML += `<div style="font-weight:bold; color:#1b4332; margin-top:10px;">📍 ${label}:</div>`;
            
            data.features.forEach(f => {
                const name = f.properties.osm_tags.name || "Обект";
                const isHotel = JSON.stringify(f.properties.category_group_ids).includes("160");
                const color = isHotel ? "#e67e22" : "#e74c3c";
                
                list.innerHTML += `<div style="font-size:0.8rem; border-bottom:1px solid #eee; padding:2px 0;">${isHotel ? '🏨' : '🍴'} ${name}</div>`;
                L.circleMarker([f.geometry.coordinates[1], f.geometry.coordinates[0]], {
                    radius: 7, color: color, fillColor: color, fillOpacity: 0.8
                }).addTo(poiMarkers).bindPopup(`${label}: ${name}`);
            });
        } catch(e) { console.log("POI error"); }
    }
</script>
</body>
</html>
