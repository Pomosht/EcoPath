<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPath AI - Работеща Версия</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --eco-green: #2d6a4f; --eco-light: #e8f5e9; }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; }
        
        .sidebar { 
            width: 360px; background: white; padding: 25px; 
            box-shadow: 4px 0 15px rgba(0,0,0,0.1); z-index: 1001; overflow-y: auto; 
        }
        
        #map { flex-grow: 1; height: 100%; z-index: 1; }

        .search-box { background: #f8f9fa; padding: 18px; border-radius: 12px; margin: 20px 0; border: 1px solid #eee; }
        .btn-route { 
            background: var(--eco-green); color: white; width: 100%; border: none;
            padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-route:hover { background: #1b4332; }

        .stats-overlay {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: white; padding: 15px 25px; border-radius: 12px;
            display: flex; gap: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .poi-item { 
            font-size: 0.85rem; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer;
        }
        .poi-item:hover { background: var(--eco-light); }
        .poi-item b { color: var(--eco-green); display: block; }

        #loader { display: none; margin-top: 10px; text-align: center; color: var(--eco-green); font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="stats-overlay">
        <div class="text-center"><strong id="co2Val">0.0</strong><br><small>kg CO₂</small></div>
        <div class="text-center"><strong id="distVal">0</strong><br><small>km</small></div>
        <div class="text-center"><strong id="timeVal">0</strong><br><small>min</small></div>
    </div>

    <div class="sidebar">
        <h2 style="color: var(--eco-green); font-weight: 800;">EcoPath AI</h2>
        <p class="text-muted small">ИНТЕЛИГЕНТНА ЕКО-НАВИГАЦИЯ</p>

        <div class="search-box">
            <label class="small fw-bold text-muted">ОТ:</label>
            <input type="text" id="startInput" class="form-control mb-2" value="Sofia">
            <label class="small fw-bold text-muted">ДО:</label>
            <input type="text" id="endInput" class="form-control mb-2" value="Plovdiv">
            <button class="btn-route" onclick="calculateRoute()">Намери маршрут</button>
            <div id="loader">🌍 Изчисляване...</div>
        </div>

        <div class="eco-meter mb-4">
            <h6>Еко Метър: <span id="ecoLabel" class="badge bg-success">Еко</span></h6>
            <input type="range" id="ecoSlider" class="form-range" min="0" max="100" value="80">
        </div>

        <h6>✨ ОБЕКТИ ПО ПЪТЯ:</h6>
        <div id="poiList"><p class="text-muted small">Тук ще се появят кафенета и забележителности...</p></div>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Твоят ключ (вече е тук)
    const ORS_API_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImVlY2M5ZDQzYzg1OTQwYzBhMzUyNmMyMGQ2ZWY2MDNmIiwiaCI6Im11cm11cjY0In0='; 

    var map = L.map('map', { zoomControl: false }).setView([42.6977, 23.3219], 7);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    var routeLayer = null;
    var markersGroup = L.layerGroup().addTo(map);

    async function getCoords(city) {
        try {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}&limit=1`;
            const response = await fetch(url);
            const data = await response.json();
            return data.length > 0 ? { lat: data[0].lat, lon: data[0].lon } : null;
        } catch (e) { return null; }
    }

    async function calculateRoute() {
        const loader = document.getElementById('loader');
        loader.style.display = 'block';

        const start = await getCoords(document.getElementById('startInput').value);
        const end = await getCoords(document.getElementById('endInput').value);

        if (!start || !end) {
            alert("Градът не е намерен!");
            loader.style.display = 'none';
            return;
        }

        const url = `https://api.openrouteservice.org/v2/directions/driving-car?api_key=${ORS_API_KEY}&start=${start.lon},${start.lat}&end=${end.lon},${end.lat}`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            
            if (data.error) throw new Error(data.error.message);

            const geometry = data.features[0].geometry;
            const summary = data.features[0].properties.summary;

            if (routeLayer) map.removeLayer(routeLayer);
            markersGroup.clearLayers();

            routeLayer = L.geoJSON(geometry, { style: { color: '#2d6a4f', weight: 6 } }).addTo(map);
            map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });

            const dist = (summary.distance / 1000).toFixed(1);
            document.getElementById('distVal').innerText = dist;
            document.getElementById('timeVal').innerText = Math.round(summary.duration / 60);
            document.getElementById('co2Val').innerText = (dist * 0.11).toFixed(1);

            fetchPOIs(geometry);
        } catch (e) {
            alert("Грешка при API: Увери се, че ползваш HTTP сървър или CodePen.");
        } finally {
            loader.style.display = 'none';
        }
    }

    async function fetchPOIs(routeGeo) {
        const poiUrl = `https://api.openrouteservice.org/pois`;
        const body = {
            request: "pois",
            geometry: { geojson: routeGeo, buffer: 1000 },
            filters: { category_group_ids: [130, 300], limit: 10 }
        };

        try {
            const res = await fetch(poiUrl, {
                method: 'POST',
                headers: { 'Authorization': ORS_API_KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            const list = document.getElementById('poiList');
            list.innerHTML = '';

            data.features.forEach(poi => {
                const name = poi.properties.osm_tags.name || "Интересен обект";
                const coords = [poi.geometry.coordinates[1], poi.geometry.coordinates[0]];
                
                const div = document.createElement('div');
                div.className = 'poi-item';
                div.innerHTML = `<b>${name}</b>`;
                div.onclick = () => map.setView(coords, 15);
                list.appendChild(div);

                L.circleMarker(coords, { radius: 6, color: '#2d6a4f', fillOpacity: 0.8 })
                    .addTo(markersGroup).bindPopup(name);
            });
        } catch (e) { console.warn("POI error"); }
    }
</script>
</body>
</html>
