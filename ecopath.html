<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPath AI - Навигация</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="ecopath.css">
</head>
<body>

<div class="wrapper">
    <div class="stats-overlay">
        <div class="text-center"><strong id="co2Val">0.0</strong><br><small>kg CO₂</small></div>
        <div class="text-center"><strong id="distVal">0</strong><br><small>km</small></div>
        <div class="text-center"><strong id="timeVal">0</strong><br><small>min</small></div>
    </div>

    <div class="sidebar">
        <h2>EcoPath AI</h2>
        <p class="text-muted small">ИНТЕЛИГЕНТНА ЕКО-НАВИГАЦИЯ</p>

        <div class="search-box">
            <label class="small fw-bold text-muted">ОТ:</label>
            <input type="text" id="startInput" class="form-control mb-2" value="Sofia">
            <label class="small fw-bold text-muted">ДО:</label>
            <input type="text" id="endInput" class="form-control mb-2" value="Plovdiv">
            
            <button class="btn-route" id="routeBtn">Намери маршрут</button>
            <div id="loader">🌍 Анализиране...</div>
        </div>

        <div class="box">
            <h6>Еко Метър: <span id="ecoLabel" class="badge bg-success">Еко</span></h6>
            <input type="range" id="ecoSlider" class="form-range" min="0" max="100" value="20">
            <div class="d-flex justify-content-between text-muted" style="font-size: 10px;">
                <span>ЕКО</span>
                <span>БЪРЗ</span>
            </div>
        </div>

        <h6 class="mt-4 small fw-bold text-muted">ПИНГНИ ОБЕКТИ:</h6>
        <div class="poi-filters">
            <div class="form-check">
                <input class="form-check-input poi-check" type="checkbox" value="130" id="checkRest">
                <label class="form-check-label small" for="checkRest">Ресторанти</label>
            </div>
            <div class="form-check">
                <input class="form-check-input poi-check" type="checkbox" value="330" id="checkHotel">
                <label class="form-check-label small" for="checkHotel">Хотели</label>
            </div>
        </div>

        <h6 class="mt-4 small fw-bold text-muted">📍 ОБЕКТИ ПО ПЪТЯ:</h6>
        <div id="poiList"><p class="text-muted small">Изберете категория...</p></div>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="ecopath.js"></script>

</body>
</html>
