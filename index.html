<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPath AI - Пълен Проект</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { 
            --eco-green: #2d6a4f; 
            --eco-light: #e8f5e9; 
            --poi-orange: #e67e22;
        }
        
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        
        .wrapper { display: flex; height: 100vh; }
        
        /* ЛЯВ ПАНЕЛ (SIDEBAR) */
        .sidebar { 
            width: 360px; 
            background: #f0f4f3; 
            padding: 25px; 
            box-shadow: 4px 0 15px rgba(0,0,0,0.1); 
            z-index: 1001; 
            overflow-y: auto; 
            border-right: 2px solid #ddd;
        }

        .sidebar h2 { margin-top: 0; color: var(--eco-green); font-weight: 800; }

        .search-box { 
            background: white; 
            padding: 18px; 
            border-radius: 12px; 
            margin: 20px 0; 
            border: 1px solid #eee; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        input.form-control { margin-bottom: 10px; border-radius: 6px; }

        .btn-route { 
            background: var(--eco-green); 
            color: white; 
            width: 100%; 
            border: none;
            padding: 12px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .btn-route:hover { background: #1b4332; }

        /* КАРТА */
        #map { flex-grow: 1; height: 100%; z-index: 1; }

        /* ИНФО ПАНЕЛ (ГОРЕ ВДЯСНО) */
        .stats-overlay {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: white; padding: 15px 25px; border-radius: 12px;
            display: flex; gap: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        /* СПИСЪК С ОБЕКТИ */
        .poi-item { 
            font-size: 0.85rem; 
            padding: 12px; 
            border-bottom: 1px solid #eee; 
            cursor: pointer; 
            background: white;
            margin-bottom: 5px;
            border-radius: 6px;
            transition: 0.2s;
        }
        .poi-item:hover { background: var(--eco-light); border-left: 4px solid var(--poi-orange); }
        .poi-item b { color: var(--eco-green); display: block; }

        #loader { display: none; margin-top: 10px; text-align: center; color: var(--eco-green); font-weight: bold; }
        
        .filter-section { margin-top: 15px; padding-top: 10px; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="stats-overlay">
        <div class="text-center"><strong id="co2Val">0.0</strong><br><small>kg CO₂</small></div>
        <div class="text-center"><strong id="distVal">0</strong><br><small>km</small></div>
        <div class="text-center"><strong id="timeVal">0</strong><br><small>min</small></div>
    </div>

    <div class="sidebar">
        <h2>EcoPath AI</h2>
        <p class="text-muted small">ИНТЕЛИГЕНТНА ЕКО-НАВИГАЦИЯ</p>

        <div class="search-box">
            <label class="small fw-bold text-muted">ОТ:</label>
            <input type="text" id="startInput" class="form-control" value="Sofia">
            <label class="small fw-bold text-muted">ДО:</label>
            <input type="text" id="endInput" class="form-control" value="Plovdiv">
            <button class="btn-route" onclick="calculateRoute()">Намери маршрут</button>
            <div id="loader">🌍 Изчисляване...</div>

            <div class="filter-section">
                <label class="small fw-bold text-muted mb-2 d-block">ФИЛТРИРАЙ ОБЕКТИ:</label>
                <div class="form-check">
                    <input class="form-check-input poi-filter" type="checkbox" value="130" id="checkRest">
                    <label class="form-check-label small" for="checkRest">🍽️ Ресторанти</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input poi-filter" type="checkbox" value="330" id="checkHotel">
                    <label class="form-check-label small" for="checkHotel">🏨 Хотели</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input poi-filter" type="checkbox" value="100" id="checkCulture">
                    <label class="form-check-label small" for="checkCulture">🎭 Култура & Забавление</label>
                </div>
            </div>
        </div>

        <h6>✨ ОБЕКТИ ПО ПЪТЯ:</h6>
        <div id="poiList"><p class="text-muted small">Избери категория и намери маршрут...</p></div>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // API Ключ за OpenRouteService
    const ORS_API_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImVlY2M5ZDQzYzg1OTQwYzBhMzUyNmMyMGQ2ZWY2MDNmIiwiaCI6Im11cm11cjY0In0='; 

    // Инициализация на картата
    var map = L.map('map', { zoomControl: false }).setView([42.6977, 23.3219], 7);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    var routeLayer = null;
    var markersGroup = L.layerGroup().addTo(map);

    // Функция за преобразуване на име на град в координати
    async function getCoords(city) {
        try {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}&limit=1`;
            const response = await fetch(url);
            const data = await response.json();
            return data.length > 0 ? { lat: data[0].lat, lon: data[0].lon } : null;
        } catch (e) { return null; }
    }

    // Основна функция за маршрута
    async function calculateRoute() {
        const loader = document.getElementById('loader');
        loader.style.display = 'block';

        const startCity = document.getElementById('startInput').value;
        const endCity = document.getElementById('endInput').value;

        const start = await getCoords(startCity);
        const end = await getCoords(endCity);

        if (!start || !end) {
            alert("Градът не е намерен! Опитайте с по-точно име.");
            loader.style.display = 'none';
            return;
        }

        const url = `https://api.openrouteservice.org/v2/directions/driving-car?api_key=${ORS_API_KEY}&start=${start.lon},${start.lat}&end=${end.lon},${end.lat}`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            
            if (data.error) throw new Error(data.error.message);

            const geometry = data.features[0].geometry;
            const summary = data.features[0].properties.summary;

            // Изчистване на старата карта
            if (routeLayer) map.removeLayer(routeLayer);
            markersGroup.clearLayers();

            // Рисуване на маршрута
            routeLayer = L.geoJSON(geometry, { style: { color: '#2d6a4f', weight: 6, opacity: 0.8 } }).addTo(map);
            map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });

            // Обновяване на статистиката
            const dist = (summary.distance / 1000).toFixed(1);
            document.getElementById('distVal').innerText = dist;
            document.getElementById('timeVal').innerText = Math.round(summary.duration / 60);
            document.getElementById('co2Val').innerText = (dist * 0.11).toFixed(1); // Приблизително CO2

            // Търсене на обекти
            fetchPOIs();
        } catch (e) {
            alert("Грешка при изчисляване на маршрута.");
            console.error(e);
        } finally {
            loader.style.display = 'none';
        }
    }

    // Функция за намиране на обекти (POI) около маршрута
    async function fetchPOIs() {
        if (!routeLayer) return;

        const routeGeo = routeLayer.toGeoJSON().features[0].geometry;
        
        // Вземане на избраните категории от чекбоксовете
        const selectedCategories = Array.from(document.querySelectorAll('.poi-filter:checked'))
                                       .map(cb => parseInt(cb.value));
        
        const list = document.getElementById('poiList');
        markersGroup.clearLayers();

        if (selectedCategories.length === 0) {
            list.innerHTML = '<p class="text-muted small">Маркирайте категория, за да видите обекти.</p>';
            return;
        }

        const poiUrl = `https://api.openrouteservice.org/pois`;
        const body = {
            request: "pois",
            geometry: { geojson: routeGeo, buffer: 1000 }, // Търси в 1км радиус около пътя
            filters: { category_group_ids: selectedCategories, limit: 15 }
        };

        try {
            const res = await fetch(poiUrl, {
                method: 'POST',
                headers: { 'Authorization': ORS_API_KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            list.innerHTML = '';

            if (!data.features || data.features.length === 0) {
                list.innerHTML = '<p class="text-muted small">Няма открити обекти в този радиус.</p>';
                return;
            }

            data.features.forEach(poi => {
                const name = poi.properties.osm_tags.name || "Интересен обект";
                const coords = [poi.geometry.coordinates[1], poi.geometry.coordinates[0]];
                
                // Добавяне в списъка
                const div = document.createElement('div');
                div.className = 'poi-item';
                div.innerHTML = `<b>${name}</b><span class="text-muted small">Обект по маршрута</span>`;
                div.onclick = () => {
                    map.setView(coords, 16);
                    L.popup().setLatLng(coords).setContent(`<b>${name}</b>`).openOn(map);
                };
                list.appendChild(div);

                // Добавяне на маркер на картата
                L.circleMarker(coords, { 
                    radius: 7, 
                    color: '#e67e22', 
                    fillColor: '#f39c12', 
                    fillOpacity: 0.9 
                }).addTo(markersGroup).bindPopup(`<b>${name}</b>`);
            });
        } catch (e) { 
            console.warn("POI fetch error"); 
        }
    }

    // Слушатели за промяна на чекбоксовете (за да се обновяват обектите веднага)
    document.querySelectorAll('.poi-filter').forEach(checkbox => {
        checkbox.addEventListener('change', fetchPOIs);
    });
</script>

</body>
</html>
